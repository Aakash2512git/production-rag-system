# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Free tier: 512MB RAM is tight. If deploy or ingest fails, upgrade backend to Starter ($7/mo).

services:
  - type: web
    name: rag-backend
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend.render
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PDF_PARSE_STRATEGY
        value: fast
      - key: RETRIEVER_MODE
        value: lite

  - type: web
    name: rag-streamlit
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.streamlit
    plan: free
    envVars:
      - key: API_URL
        fromService:
          name: rag-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
